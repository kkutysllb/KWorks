# KWorks Desktop — Release Pipeline (macOS / Windows / Linux)
#
# 触发方式：
#   1. 推送 semver tag `vX.Y.Z` → 各平台构建 artifacts → 单独 release job 统一发布
#   2. Actions 页面手动运行（workflow_dispatch）→ 只构建并上传 Artifacts，不发布 Release
#
# 工作原理：
#   build matrix 在对应 OS/架构 runner 上编译原生模块并打包，全部使用
#   `electron-builder --publish never`。发布阶段只在所有构建成功后运行一次，
#   下载全部 artifacts、重建 latest-mac.yml，然后用 softprops/action-gh-release
#   一次性创建/更新 GitHub Release。
#
# macOS 必需 Secrets（用 desktop/scripts/export-mac-secrets.mjs 生成）：
#   MAC_CERTIFICATE                  — Developer ID .p12 的 base64
#   MAC_CERTIFICATE_PWD              — .p12 导出密码
#   APPLE_ID                         — Apple ID 邮箱
#   APPLE_APP_SPECIFIC_PASSWORD      — appleid.apple.com 生成的应用专用密码
#   APPLE_TEAM_ID                    — 开发者团队 ID（如 DHV5D72JNF）
#
# Windows 当前构建未签名版本；Linux 无需证书。

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  build:
    name: Build (${{ matrix.display }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 分开跑架构：KWorks 的 QiongQi runtime 含原生模块，必须在目标架构 runner 上 rebuild。
          - os: macos-15
            platform: mac
            display: "macOS Apple Silicon"
            artifact_suffix: mac-arm64
            builder_args: "--mac --arm64"
          - os: macos-15-intel
            platform: mac
            display: "macOS Intel"
            artifact_suffix: mac-x64
            builder_args: "--mac --x64"
          - os: windows-2022
            platform: win
            display: "Windows x64"
            artifact_suffix: win
            builder_args: "--win nsis --x64"
          - os: ubuntu-22.04
            platform: linux
            display: "Linux x64"
            artifact_suffix: linux
            builder_args: "--linux AppImage --x64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify release tag matches desktop package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./desktop/package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match desktop/package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
            ~\AppData\Local\pnpm\store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ hashFiles('desktop/pnpm-lock.yaml') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install Linux build deps (AppImage)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev libnss3-dev libatk1.0-dev libatk-bridge2.0-dev \
            libgtk-3-dev libgbm-dev libasound2-dev libfuse2
        continue-on-error: true

      - name: Ensure Python distutils
        shell: bash
        run: |
          configure_python_for_node_gyp() {
            local python_path="$1"
            echo "PYTHON=$python_path" >> "$GITHUB_ENV"
            echo "npm_config_python=$python_path" >> "$GITHUB_ENV"
            echo "Configured node-gyp Python: $python_path"
          }

          PYTHON_BIN=""
          if command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN="python3"
          elif command -v python >/dev/null 2>&1; then
            PYTHON_BIN="python"
          else
            echo "::error::Python is required for native module builds"
            exit 1
          fi

          if "$PYTHON_BIN" -c "import distutils.version" 2>/dev/null; then
            echo "distutils available"
            configure_python_for_node_gyp "$PYTHON_BIN"
          else
            echo "distutils missing; preparing isolated Python environment"
            VENV_DIR="${RUNNER_TEMP:-/tmp}/python-distutils"
            rm -rf "$VENV_DIR"

            if "$PYTHON_BIN" -m venv "$VENV_DIR"; then
              VENV_PY="$VENV_DIR/bin/python"
              if [ ! -x "$VENV_PY" ]; then
                VENV_PY="$VENV_DIR/Scripts/python.exe"
              fi

              if [ -x "$VENV_PY" ] &&
                "$VENV_PY" -m pip install --upgrade setuptools wheel &&
                "$VENV_PY" -c "import distutils.version" 2>/dev/null; then
                echo "distutils available in isolated Python environment"
                configure_python_for_node_gyp "$VENV_PY"
              else
                echo "::warning::Could not prepare distutils in isolated Python environment"
              fi
            else
              echo "::warning::Could not create isolated Python environment"
            fi

            if ! "$PYTHON_BIN" -c "import distutils.version" 2>/dev/null &&
              ! "${VENV_PY:-$PYTHON_BIN}" -c "import distutils.version" 2>/dev/null; then
              echo "Trying setuptools install with PEP 668 override as a fallback"
              "$PYTHON_BIN" -m pip install --user --break-system-packages setuptools ||
                "$PYTHON_BIN" -m pip install --break-system-packages setuptools ||
                "$PYTHON_BIN" -m pip install --user setuptools ||
                echo "::warning::Could not install setuptools during preflight; continuing so the native build step reports the real failure if needed"

              if "$PYTHON_BIN" -c "import distutils.version" 2>/dev/null; then
                configure_python_for_node_gyp "$PYTHON_BIN"
              fi
            fi
          fi

      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:desktop

      - name: Verify frontend output
        shell: bash
        run: |
          test -f frontend/out/index.html || { echo "::error::frontend/out/index.html missing"; exit 1; }
          test -d frontend/out/_next || { echo "::error::frontend/out/_next missing"; exit 1; }

      - name: Build qiongqi
        working-directory: qiongqi
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Verify qiongqi output
        shell: bash
        run: |
          test -f qiongqi/packages/cli-layer/cli/dist/serve-entry.js || { echo "::error::serve-entry.js missing"; exit 1; }

      - name: Install desktop deps
        working-directory: desktop
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Check macOS signing secrets availability
        if: runner.os == 'macOS'
        id: mac_secrets
        shell: bash
        env:
          MAC_CERT: ${{ secrets.MAC_CERTIFICATE }}
          MAC_PWD: ${{ secrets.MAC_CERTIFICATE_PWD }}
        run: |
          if [ -n "$MAC_CERT" ] && [ -n "$MAC_PWD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "macOS signing secrets are available"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing secrets are missing; building unsigned macOS artifacts"
          fi

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && steps.mac_secrets.outputs.available == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTIFICATE }}
          p12-password: ${{ secrets.MAC_CERTIFICATE_PWD }}

      - name: Build desktop shell
        working-directory: desktop
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          pnpm run build
          pnpm run build:frontend

      - name: Prepare package resources
        working-directory: desktop
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CI: "true"
          NODE_OPTIONS: --max-old-space-size=4096
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && steps.mac_secrets.outputs.available == 'true' }}
        run: pnpm run prepare:package-resources

      - name: Verify package resources
        working-directory: desktop
        shell: bash
        run: pnpm run verify:package-resources

      - name: Build Electron package (${{ matrix.display }})
        working-directory: desktop
        shell: bash
        timeout-minutes: 45
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CI: "true"
          DEBUG: ${{ runner.os == 'Windows' && 'electron-builder,electron-builder:*' || '' }}
          NODE_OPTIONS: --max-old-space-size=4096
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && steps.mac_secrets.outputs.available == 'true' }}
        run: npx --yes electron-builder@26.8.1 ${{ matrix.builder_args }} --publish never

      - name: Verify packaged Electron resources
        working-directory: desktop
        shell: bash
        env:
          KWORKS_PACKAGE_PLATFORM: ${{ matrix.platform }}
        run: pnpm run verify:built-package-resources

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KWorks-${{ matrix.artifact_suffix }}-build
          path: |
            desktop/release/KWorks-*
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.blockmap
            desktop/release/*.exe
            desktop/release/*.exe.blockmap
            desktop/release/*.AppImage
            desktop/release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find raw-artifacts -type f \( \
            -name 'KWorks-*' -o \
            -name 'latest*.yml' \
          \) -exec cp -v {} release-assets/ \;
          rm -f release-assets/latest-mac.yml
          node desktop/scripts/generate-mac-latest.mjs release-assets
          echo "=== Release assets ==="
          ls -lhS release-assets/

      - name: Generate release notes
        shell: bash
        run: |
          {
            echo "## KWorks ${{ steps.meta.outputs.version }}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | Format | Architecture |"
            echo "| --- | --- | --- |"
            echo "| macOS Apple Silicon | .dmg / .zip | arm64 |"
            echo "| macOS Intel | .dmg / .zip | x64 |"
            echo "| Windows | .exe | x64 |"
            echo "| Linux | .AppImage | x64 |"
            echo ""
            echo "### Build"
            echo ""
            echo "- Version: \`${{ steps.meta.outputs.version }}\`"
            echo "- Commit: \`$(git rev-parse --short HEAD)\`"
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: KWorks ${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
