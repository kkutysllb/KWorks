# KWorks Desktop — Release Pipeline (macOS / Windows / Linux)
#
# 触发方式：
#   1. 推送 tag `v*`（如 v0.1.0）→ 三平台并行构建 → 发布到同一个 GitHub Release
#   2. Actions 页面手动运行（workflow_dispatch）→ 构建产物上传到 Artifacts（不发布）
#
# 工作原理：
#   matrix 让 3 个平台在各自的 runner 上并行运行（macos/windows/ubuntu-latest）。
#   每个平台独立编译原生模块（node-pty + better-sqlite3），产出各自平台的安装包。
#   三个平台的产物最终汇聚到同一个 GitHub Release（通过 tag 关联，allowUpdates 追加）。
#
# macOS 必需 Secrets（用 desktop/scripts/export-mac-secrets.mjs 生成）：
#   MAC_CERTIFICATE                  — Developer ID .p12 的 base64
#   MAC_CERTIFICATE_PWD              — .p12 导出密码
#   APPLE_ID                         — Apple ID 邮箱
#   APPLE_APP_SPECIFIC_PASSWORD      — appleid.apple.com 生成的应用专用密码
#   APPLE_TEAM_ID                    — 开发者团队 ID（如 DHV5D72JNF）
#
# Windows / Linux 无需任何证书或额外配置。
# GH_TOKEN 用 Actions 自动注入的 GITHUB_TOKEN。

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# 同一个 tag 的三平台构建组各自独立，互不取消
jobs:
  release:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # concurrency 必须在 job 级别：用到了 matrix.os 这个 job-level context。
    # 若放在 workflow 顶层，workflow 文件会因访问不到 matrix context 而加载失败。
    concurrency:
      group: release-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: false
    strategy:
      fail-fast: false # 一个平台失败不影响其他平台继续构建
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_suffix: mac
          - os: windows-latest
            platform: win
            artifact_suffix: win
          - os: ubuntu-latest
            platform: linux
            artifact_suffix: linux

    permissions:
      contents: write # electron-builder 创建/更新 GitHub Release

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false

      # pnpm store 路径随平台不同，让 pnpm 自己决定，cache action 自动适配
      - name: ♻️ Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
            ~\AppData\Local\pnpm\store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      # ─────────────────────────────────────────────────────────────
      # Linux：安装 AppImage 打包所需的系统库
      # ubuntu-latest 默认已有，但为确保 AppImage 构建成功率显式补齐
      # ─────────────────────────────────────────────────────────────
      - name: 🐧 Install Linux build deps (AppImage)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-dev libnss3-dev libatk1.0-dev libatk-bridge2.0-dev \
            libgtk-3-dev libgbm-dev libasound2-dev
        continue-on-error: true # 某些包在新版 ubuntu 可能已被替代，失败不阻断

      # ─────────────────────────────────────────────────────────────
      # 构建前端（静态导出，三平台产物相同但各自构建以避免跨平台文件污染）
      # ─────────────────────────────────────────────────────────────
      - name: 🎨 Build frontend
        working-directory: frontend
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run build:desktop

      - name: ✅ Verify frontend output
        shell: bash
        run: |
          test -f frontend/out/index.html || { echo "❌ frontend/out/index.html 缺失"; exit 1; }
          test -d frontend/out/_next || { echo "❌ frontend/out/_next 缺失"; exit 1; }
          echo "✓ 前端产物就绪"

      # ─────────────────────────────────────────────────────────────
      # 构建 qiongqi（含 better-sqlite3 C++ 原生模块，每平台各自编译）
      # ─────────────────────────────────────────────────────────────
      - name: ⚙️ Build qiongqi
        working-directory: qiongqi
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: ✅ Verify qiongqi output
        shell: bash
        run: |
          test -f qiongqi/packages/cli-layer/cli/dist/serve-entry.js || { echo "❌ serve-entry.js 缺失"; exit 1; }
          echo "✓ qiongqi 产物就绪"

      # ─────────────────────────────────────────────────────────────
      # Python distutils 兜底：node-pty + better-sqlite3 都用 node-gyp 编译，
      # node-gyp 9.x 依赖 Python distutils（Python 3.12+ 已移除）。
      # macOS/Linux 用 pip3，Windows 用 python -m pip
      # ─────────────────────────────────────────────────────────────
      - name: 🐍 Ensure Python distutils (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          if python3 -c "import distutils.version" 2>/dev/null; then
            echo "✓ distutils 可用"
          else
            echo "⚠️ distutils 缺失（Python 3.12+），安装 setuptools..."
            pip3 install --user setuptools || pip3 install --break-system-packages setuptools
          fi

      - name: 🐍 Ensure Python distutils (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (python -c "import distutils.version" 2>$null)) {
            Write-Host "⚠️ distutils 缺失，安装 setuptools..."
            python -m pip install --user setuptools
          } else {
            Write-Host "✓ distutils 可用"
          }

      # ─────────────────────────────────────────────────────────────
      # 安装 desktop 依赖（node-pty 原生模块每平台编译）
      # ─────────────────────────────────────────────────────────────
      - name: 🔨 Install desktop deps
        working-directory: desktop
        shell: bash
        run: pnpm install --frozen-lockfile

      # ─────────────────────────────────────────────────────────────
      # 仅 macOS：导入 Apple Developer ID 签名证书到 runner 钥匙串
      # ─────────────────────────────────────────────────────────────
      - name: 🔑 Import Apple signing certificate (macOS only)
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERTIFICATE }}
          p12-password: ${{ secrets.MAC_CERTIFICATE_PWD }}

      # ─────────────────────────────────────────────────────────────
      # 打包 + 签名(mac) + 公证(mac) + 发布
      # ─────────────────────────────────────────────────────────────
      - name: 🚀 Build & publish (${{ matrix.platform }})
        working-directory: desktop
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: "true"
          # Windows: 不提供 CSC_LINK → electron-builder 自动跳过签名
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && 'true' || 'false' }}
        run: |
          # tag 触发 → 发布到 Release；手动触发 → 仅构建不上传
          if [ "${{ github.event_name }}" = "push" ]; then
            pnpm run build && pnpm run build:frontend && pnpm run verify:package-resources && \
              npx electron-builder --${{ matrix.platform }} --publish always
          else
            pnpm run build && pnpm run build:frontend && pnpm run verify:package-resources && \
              npx electron-builder --${{ matrix.platform }} --publish never
            echo "💡 手动触发：产物仅上传到 Artifacts，未发布 Release"
          fi

      # ─────────────────────────────────────────────────────────────
      # 上传构建产物到 Actions（调试 + 草稿模式主力产出）
      # ─────────────────────────────────────────────────────────────
      - name: 📎 Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: KWorks-${{ matrix.artifact_suffix }}-build
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/*.AppImage
            desktop/release/latest*.yml
          if-no-files-found: warn
          retention-days: 14
