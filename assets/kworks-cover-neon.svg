    <circle cx="60" cy="50" r="30" fill="none" stroke="#7F77DD" stroke-width="1.5"/>
    <circle cx="60" cy="50" r="22" fill="none" stroke="#AFA9EC" stroke-width="0.5" stroke-dasharray="3 2"/>
    <text x="60" y="46" text-anchor="middle" font-family="monospace" font-size="11" fill="#CECBF6">TYPE</text>
    <text x="60" y="60" text-anchor="middle" font-family="monospace" font-size="11" fill="#CECBF6">SCRIPT</text>
    <rect x="15" y="95" width="90" height="18" rx="3" fill="#EEEDFE"/>
    <text x="60" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#534AB7">Port :9193</text>
    <text x="60" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#5F5E5A">API Gateway</text>
  </g>

  <g transform="translate(255, 210)">
    <circle cx="60" cy="50" r="38" fill="#0C447C"/>
    <circle cx="60" cy="50" r="30" fill="none" stroke="#378ADD" stroke-width="1.5"/>
    <circle cx="60" cy="50" r="22" fill="none" stroke="#85B7EB" stroke-width="0.5" stroke-dasharray="3 2"/>
