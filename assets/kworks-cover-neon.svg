<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" width="100%" role="img">
  <title>KWorks — Local-first AI Workspace</title>
  <desc>KWorks project cover in neon tech-comic style: three modules interconnected with prominent title</desc>

  <defs>
    <pattern id="grid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="16" height="16" fill="none"/>
      <circle cx="8" cy="8" r="0.5" fill="#B4B2A9" opacity="0.3"/>
    </pattern>
    <pattern id="lines" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="6" y2="0" stroke="#D3D1C7" stroke-width="0.3" opacity="0.4"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="680" height="440" fill="url(#grid)"/>

  <rect x="0" y="0" width="680" height="125" fill="#26215C"/>
  <rect x="0" y="20" width="680" height="4" fill="#7F77DD" opacity="0.6"/>
  <rect x="0" y="105" width="680" height="4" fill="#7F77DD" opacity="0.6"/>

  <rect x="170" y="14" width="340" height="16" rx="3" fill="none" stroke="#7F77DD" stroke-width="0.5" opacity="0.3"/>
  <text x="340" y="26" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#AFA9EC" letter-spacing="4">PROJECT COVER</text>

  <text x="340" y="82" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="500" fill="#FFFFFF" letter-spacing="6">KWORKS</text>

  <text x="340" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#AFA9EC" letter-spacing="3">LOCAL-FIRST AI WORKSPACE</text>

  <rect x="60" y="145" width="560" height="2" fill="#D3D1C7" opacity="0.5"/>

  <rect x="140" y="195" width="400" height="2" fill="#D3D1C7" opacity="0.3"/>
  <rect x="140" y="155" width="400" height="40" rx="2" fill="none" stroke="#D3D1C7" stroke-width="0.3" opacity="0.3"/>

  <line x1="180" y1="195" x2="180" y2="155" stroke="#D3D1C7" stroke-width="0.3" opacity="0.3"/>
  <line x1="340" y1="195" x2="340" y2="155" stroke="#D3D1C7" stroke-width="0.3" opacity="0.3"/>
  <line x1="500" y1="195" x2="500" y2="155" stroke="#D3D1C7" stroke-width="0.3" opacity="0.3"/>

  <rect x="140" y="158" width="200" height="34" rx="0" fill="#EEEDFE"/>
  <text x="240" y="180" text-anchor="middle" font-family="monospace" font-size="13" font-weight="500" fill="#534AB7">qiongqi</text>

  <rect x="340" y="158" width="160" height="34" rx="0" fill="#E6F1FB"/>
  <text x="420" y="180" text-anchor="middle" font-family="monospace" font-size="13" font-weight="500" fill="#378ADD">frontend</text>

  <rect x="500" y="158" width="40" height="34" rx="0" fill="#FAECE7"/>
  <text x="520" y="180" text-anchor="middle" font-family="monospace" font-size="13" font-weight="500" fill="#D85A30">desk</text>

  <g transform="translate(120, 210)">
