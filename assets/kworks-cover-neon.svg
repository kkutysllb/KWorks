    <text x="60" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#185FA5">Port :9192</text>
    <text x="60" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#5F5E5A">Web UI</text>
  </g>

  <g transform="translate(390, 210)">
    <circle cx="60" cy="50" r="38" fill="#4A1B0C"/>
    <circle cx="60" cy="50" r="30" fill="none" stroke="#D85A30" stroke-width="1.5"/>
    <circle cx="60" cy="50" r="22" fill="none" stroke="#F0997B" stroke-width="0.5" stroke-dasharray="3 2"/>
    <text x="60" y="46" text-anchor="middle" font-family="monospace" font-size="10" fill="#F5C4B3">ELEC</text>
    <text x="60" y="60" text-anchor="middle" font-family="monospace" font-size="10" fill="#F5C4B3">TRON</text>
    <rect x="15" y="95" width="90" height="18" rx="3" fill="#FAECE7"/>
    <text x="60" y="108" text-anchor="middle" font-family="monospace" font-size="10" fill="#993C1D">Desktop</text>
    <text x="60" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="#5F5E5A">Shell</text>
  </g>

  <line x1="218" y1="250" x2="255" y2="250" stroke="#888780" stroke-width="1" opacity="0.5"/>
  <line x1="353" y1="250" x2="390" y2="250" stroke="#888780" stroke-width="1" opacity="0.5"/>

  <circle cx="218" cy="250" r="2" fill="#7F77DD"/>
  <circle cx="255" cy="250" r="2" fill="#378ADD"/>
  <circle cx="353" cy="250" r="2" fill="#378ADD"/>
  <circle cx="390" cy="250" r="2" fill="#D85A30"/>

  <rect x="0" y="360" width="680" height="80" fill="#26215C" opacity="0.15"/>

  <rect x="60" y="375" width="95" height="22" rx="4" fill="#EEEDFE"/>
  <text x="107" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#534AB7">pnpm</text>

  <rect x="168" y="375" width="105" height="22" rx="4" fill="#E6F1FB"/>
  <text x="220" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#185FA5">TypeScript</text>

  <rect x="286" y="375" width="100" height="22" rx="4" fill="#EEEDFE"/>
  <text x="336" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#534AB7">Next.js</text>

  <rect x="399" y="375" width="105" height="22" rx="4" fill="#FAECE7"/>
  <text x="451" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#993C1D">Electron</text>

  <rect x="517" y="375" width="100" height="22" rx="4" fill="#E6F1FB"/>
  <text x="567" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#185FA5">React</text>

  <text x="340" y="420" text-anchor="middle" font-family="monospace" font-size="10" fill="#B4B2A9">cd qiongqi &amp;&amp; pnpm run build &amp;&amp; cd .. &amp;&amp; ./start.sh start</text>

  <rect x="0" y="0" width="4" height="440" fill="#7F77DD" opacity="0.3"/>
  <rect x="676" y="0" width="4" height="440" fill="#7F77DD" opacity="0.3"/>
</svg>