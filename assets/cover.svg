<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 620" width="100%" role="img" aria-labelledby="title desc">
  <title id="title">KWorks — Local-first AI workspace architecture</title>
  <desc id="desc">A technical map showing the Electron desktop shell, Next.js frontend, QiongQi runtime, pluggable capabilities, and model providers.</desc>

  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#9fb4c4" stroke-width="1" opacity=".09"/>
      <circle cx="0" cy="0" r="1" fill="#8ca4b4" opacity=".16"/>
    </pattern>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1116"/>
      <stop offset="1" stop-color="#101a20"/>
    </linearGradient>
    <linearGradient id="kernel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#153b42"/>
      <stop offset="1" stop-color="#10252d"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#65d5c4"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#f4b860"/>
    </marker>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .eyebrow { font-size: 11px; letter-spacing: 3px; font-weight: 700; }
      .label { font-size: 12px; letter-spacing: 1.3px; font-weight: 700; }
      .small { font-size: 11px; }
      .muted { fill: #8ea1ab; }
      .hairline { stroke: #88a0aa; stroke-width: 1; opacity: .38; }
    </style>
  </defs>

  <rect width="1440" height="620" fill="url(#bg)"/>
  <rect width="1440" height="620" fill="url(#grid)"/>
  <path d="M0 108H1440" stroke="#6c8790" opacity=".18"/>
  <path d="M0 566H1440" stroke="#6c8790" opacity=".18"/>

  <!-- restrained ambient light behind the kernel -->
  <circle cx="770" cy="338" r="210" fill="#48bbaa" opacity=".045" filter="url(#soft)"/>
  <circle cx="1190" cy="245" r="170" fill="#e8a74f" opacity=".025" filter="url(#soft)"/>

  <!-- header / project identity -->
  <g transform="translate(64 54)">
    <text class="mono eyebrow" fill="#65d5c4">SYSTEM MAP / KWORKS</text>
    <text class="sans" y="52" fill="#f3f7f7" font-size="46" font-weight="760" letter-spacing="1">LOCAL-FIRST AI WORKSPACE</text>
    <text class="sans muted" y="82" font-size="15">A composable desktop, frontend, and multi-agent runtime — built to stay on your machine.</text>
  </g>
  <g transform="translate(1248 52)">
    <rect width="126" height="30" rx="15" fill="#14262b" stroke="#3e706e"/>
    <circle cx="19" cy="15" r="4" fill="#65d5c4"/>
    <text class="mono" x="31" y="19" fill="#a9d8d1" font-size="10" letter-spacing="1.5">KERNEL V3</text>
  </g>

  <!-- left: product layers -->
  <g transform="translate(64 164)">
    <text class="mono eyebrow" fill="#8ea1ab">PRODUCT LAYERS</text>
    <g transform="translate(0 28)">
      <rect width="286" height="76" rx="8" fill="#152129" stroke="#4b7079"/>
      <rect x="14" y="15" width="42" height="42" rx="7" fill="#20343d" stroke="#65d5c4"/>
      <path d="M24 29h22v15H24zM28 25h14M29 48h12" fill="none" stroke="#65d5c4" stroke-width="2"/>
      <text class="sans label" x="72" y="30" fill="#e4f3f0">ELECTRON DESKTOP</text>
      <text class="sans small muted" x="72" y="50">Native shell · packaged runtime</text>
      <text class="mono" x="72" y="66" fill="#6ea9a6" font-size="10">desktop/</text>
    </g>
    <g transform="translate(0 116)">
      <rect width="286" height="76" rx="8" fill="#16242c" stroke="#4b7079"/>
      <rect x="14" y="15" width="42" height="42" rx="7" fill="#24353a" stroke="#65d5c4"/>
      <path d="M24 28h22v18H24zM28 34h14M28 39h9" fill="none" stroke="#65d5c4" stroke-width="2"/>
      <text class="sans label" x="72" y="30" fill="#e4f3f0">NEXT.JS FRONTEND</text>
      <text class="sans small muted" x="72" y="50">React UI · SSE · CodeMirror · xyflow</text>
      <text class="mono" x="72" y="66" fill="#6ea9a6" font-size="10">frontend/ · :9192</text>
    </g>
    <g transform="translate(0 204)">
      <rect width="286" height="76" rx="8" fill="#18232a" stroke="#d09347"/>
      <rect x="14" y="15" width="42" height="42" rx="7" fill="#31291f" stroke="#f4b860"/>
      <path d="M26 28h18v18H26zM30 24v8M40 24v8M30 46v8M40 46v8" fill="none" stroke="#f4b860" stroke-width="2"/>
      <text class="sans label" x="72" y="30" fill="#fff0d7">QIONGQI RUNTIME</text>
      <text class="sans small muted" x="72" y="50">Turn orchestration · LoopRunner · A2A</text>
      <text class="mono" x="72" y="66" fill="#c79955" font-size="10">qiongqi/ · :9193</text>
    </g>
  </g>

  <!-- connectors from product layers to runtime -->
  <g fill="none" stroke="#65d5c4" stroke-width="1.5" opacity=".72" marker-end="url(#arrow-teal)">
    <path d="M350 230H510V324H620"/>
    <path d="M350 318H510V344H620"/>
  </g>
  <text class="mono" x="382" y="218" fill="#6ea9a6" font-size="9">IPC / HTTP</text>
  <text class="mono" x="382" y="307" fill="#6ea9a6" font-size="9">HTTP / SSE</text>

  <!-- center: kernel -->
  <g transform="translate(620 190)">
    <text class="mono eyebrow" x="150" fill="#f4b860" text-anchor="middle">DOMAIN-NEUTRAL CORE</text>
    <circle cx="150" cy="164" r="124" fill="none" stroke="#3b766f" stroke-width="1" stroke-dasharray="3 8" opacity=".75"/>
    <circle cx="150" cy="164" r="103" fill="none" stroke="#8e6738" stroke-width="1" stroke-dasharray="2 10" opacity=".7"/>
    <rect x="28" y="42" width="244" height="244" rx="24" fill="url(#kernel)" stroke="#65d5c4" stroke-width="1.5"/>
    <rect x="42" y="56" width="216" height="216" rx="18" fill="none" stroke="#3e706e" opacity=".7"/>
    <circle cx="150" cy="118" r="31" fill="#0e252b" stroke="#f4b860" stroke-width="2"/>
    <path d="M139 102h22v32h-22zM133 110h6M133 126h6M161 110h6M161 126h6" fill="none" stroke="#f4b860" stroke-width="2"/>
    <text class="sans" x="150" y="184" text-anchor="middle" fill="#f3f7f7" font-size="28" font-weight="760" letter-spacing="2">QIONGQI</text>
    <text class="mono" x="150" y="207" text-anchor="middle" fill="#9fc8c0" font-size="11" letter-spacing="2">AGENT RUNTIME</text>
    <path d="M74 232H226" stroke="#477c78"/>
    <text class="sans small" x="150" y="253" text-anchor="middle" fill="#b9cbc9">LoopRunner · PromptBuilder · Memory</text>
  </g>

  <!-- right: capability matrix -->
  <g transform="translate(982 164)">
    <text class="mono eyebrow" fill="#8ea1ab">CAPABILITY MATRIX</text>
    <g transform="translate(0 27)">
      <rect width="188" height="56" rx="7" fill="#1b252b" stroke="#6d7572"/>
      <circle cx="25" cy="28" r="12" fill="#342c20" stroke="#f4b860"/>
      <path d="M19 28h12M25 22v12" stroke="#f4b860" stroke-width="2"/>
      <text class="sans label" x="50" y="25" fill="#f5e1c0">SKILLS</text><text class="sans small muted" x="50" y="41">domain playbooks</text>
    </g>
    <g transform="translate(200 27)">
      <rect width="188" height="56" rx="7" fill="#18272c" stroke="#507a77"/>
      <circle cx="25" cy="28" r="12" fill="#203a3a" stroke="#65d5c4"/>
      <path d="M19 24h12v10H19zM22 21v3M28 21v3" fill="none" stroke="#65d5c4" stroke-width="2"/>
      <text class="sans label" x="50" y="25" fill="#d9f2ec">MEMORY</text><text class="sans small muted" x="50" y="41">isolated context</text>
    </g>
    <g transform="translate(0 95)">
      <rect width="188" height="56" rx="7" fill="#18272c" stroke="#507a77"/>
      <circle cx="25" cy="28" r="12" fill="#203a3a" stroke="#65d5c4"/>
      <path d="M18 27h14M25 20v14" stroke="#65d5c4" stroke-width="2"/>
      <text class="sans label" x="50" y="25" fill="#d9f2ec">MCP</text><text class="sans small muted" x="50" y="41">external services</text>
    </g>
    <g transform="translate(200 95)">
      <rect width="188" height="56" rx="7" fill="#1b252b" stroke="#6d7572"/>
      <circle cx="25" cy="28" r="12" fill="#342c20" stroke="#f4b860"/>
      <path d="M20 22h10v12H20zM23 19v3M27 19v3" fill="none" stroke="#f4b860" stroke-width="2"/>
      <text class="sans label" x="50" y="25" fill="#f5e1c0">TOOLS</text><text class="sans small muted" x="50" y="41">safe execution</text>
    </g>
    <g transform="translate(0 163)">
      <rect width="188" height="56" rx="7" fill="#18272c" stroke="#507a77"/>
      <circle cx="25" cy="28" r="12" fill="#203a3a" stroke="#65d5c4"/>
      <path d="M19 23h12v10H19zM22 27h6" fill="none" stroke="#65d5c4" stroke-width="2"/>
      <text class="sans label" x="50" y="25" fill="#d9f2ec">A2A</text><text class="sans small muted" x="50" y="41">agent collaboration</text>
    </g>
    <g transform="translate(200 163)">
      <rect width="188" height="56" rx="7" fill="#18272c" stroke="#507a77"/>
      <circle cx="25" cy="28" r="12" fill="#203a3a" stroke="#65d5c4"/>
      <path d="M18 34l5-8 4 4 6-10" fill="none" stroke="#65d5c4" stroke-width="2"/>
      <text class="sans label" x="50" y="25" fill="#d9f2ec">OBSERVABILITY</text><text class="sans small muted" x="50" y="41">traces · metrics · events</text>
    </g>
  </g>

  <!-- capability bus and connectors -->
  <path d="M902 330H952" stroke="#f4b860" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <path d="M952 218V422" stroke="#f4b860" stroke-width="1" opacity=".68"/>
  <g stroke="#f4b860" stroke-width="1" opacity=".68">
    <path d="M952 218H982"/><path d="M952 286H982"/><path d="M952 354H982"/><path d="M952 422H982"/>
    <path d="M952 218H1182"/><path d="M952 286H1182"/><path d="M952 354H1182"/><path d="M952 422H1182"/>
  </g>

  <!-- footer provider rail -->
  <g transform="translate(64 520)">
    <path d="M0 0H1312" class="hairline"/>
    <text class="mono eyebrow" y="31" fill="#8ea1ab">MODEL PROVIDERS / OPENAI-COMPATIBLE</text>
    <text class="sans" x="380" y="31" fill="#d9e6e5" font-size="13">DeepSeek</text>
    <circle cx="449" cy="26" r="3" fill="#65d5c4"/>
    <text class="sans" x="486" y="31" fill="#d9e6e5" font-size="13">GLM</text>
    <circle cx="534" cy="26" r="3" fill="#65d5c4"/>
    <text class="sans" x="571" y="31" fill="#d9e6e5" font-size="13">OpenRouter</text>
    <circle cx="669" cy="26" r="3" fill="#f4b860"/>
    <text class="sans" x="706" y="31" fill="#d9e6e5" font-size="13">Local vLLM</text>
    <text class="mono" x="1006" y="31" fill="#6ea9a6" font-size="10">127.0.0.1 · PRIVATE BY DEFAULT</text>
  </g>
</svg>
