appId: com.kworks.desktop
productName: KWorks
directories:
  output: release
files:
  - dist/**
  - package.json
extraResources:
  - from: ../frontend/out
    to: frontend-out
  - from: ../qiongqi
    to: qiongqi
    filter:
      - '**/*'
      - '!node_modules/.cache/**'
      - '!**/.turbo/**'
      - '!**/.DS_Store'
  - from: ../skills
    to: skills
  - from: build/icons
    to: icons
    filter:
      - 16x16.png
      - 32x32.png
  - from: build/icon.png
    to: icon.png
afterSign: scripts/notarize.cjs
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # identity 不写死：让 electron-builder 自动匹配钥匙串里唯一的
  # "Developer ID Application" 证书。本地与 CI 统一行为。
  # CI 通过 CSC_NAME / 导入证书到 runner 钥匙串后即可自动发现。
  notarize: false
  target:
    - dmg
    - zip
dmg:
  sign: false
  contents:
    - x: 130
      y: 220
win:
  icon: build/icon.ico
  # 不签名：未配置 CSC_LINK/certificateFile 时 electron-builder 会自动跳过签名。
  # 用户首次运行时 SmartScreen 会提示「Windows 已保护你的电脑」，
  # 点「更多信息 → 仍要运行」即可（与未签名的开发版应用体验一致）。
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  differentialPackage: true
  shortcutName: KWorks
linux:
  icon: build/icon.png
  category: Office
  # AppImage：单一文件，双击即用，覆盖 Ubuntu/Debian/Fedora/Arch 等绝大多数发行版
  target:
    - AppImage
  maintainer: KWorks Team <13609247807@139.com>
publish:
  provider: github
  owner: kkutysllb
  repo: KWorks
  # 三平台并行构建时，首个平台创建 Release，后续平台会追加产物到同一 Release。
  # allowUpdates 让 electron-builder 在 Release 已存在时自动上传 assets 而非报错。
  allowUpdates: true
  # 并发上传时用 HTML 上自动生成的 releaseNotes，不需要额外 changelog 文件
  releaseType: release
