appId: com.kworks.desktop
productName: KWorks
directories:
  output: release
files:
  - dist/**
  - package.json
extraResources:
  - from: ../frontend/out
    to: frontend-out
  - from: ../skills
    to: skills
  - from: build/icons
    to: icons
    filter:
      - 16x16.png
      - 32x32.png
  - from: build/icon.png
    to: icon.png
afterSign: scripts/notarize.cjs
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  extraResources:
    - from: build/qiongqi-runtime.tar.gz
      to: qiongqi-runtime.tar.gz
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # identity 不写死：让 electron-builder 自动匹配钥匙串里唯一的
  # "Developer ID Application" 证书。本地与 CI 统一行为。
  # CI 通过 CSC_NAME / 导入证书到 runner 钥匙串后即可自动发现。
  notarize: false
  target:
    - dmg
    - zip
dmg:
  sign: false
  contents:
    # 左侧：应用本体
    - x: 130
      y: 220
    # 右侧：Applications 文件夹快捷方式（拖拽安装）
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  icon: build/icon.ico
  extraResources:
    - from: build/qiongqi-runtime/qiongqi
      to: qiongqi
  # 不签名：未配置 CSC_LINK/certificateFile 时 electron-builder 会自动跳过签名。
  # 用户首次运行时 SmartScreen 会提示「Windows 已保护你的电脑」，
  # 点「更多信息 → 仍要运行」即可（与未签名的开发版应用体验一致）。
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  differentialPackage: true
  shortcutName: KWorks
linux:
  icon: build/icon.png
  category: Office
  extraResources:
    - from: build/qiongqi-runtime/qiongqi
      to: qiongqi
  # AppImage：单一文件，双击即用，覆盖 Ubuntu/Debian/Fedora/Arch 等绝大多数发行版
  target:
    - AppImage
  maintainer: KWorks Team <13609247807@139.com>
publish:
  provider: github
  owner: kkutysllb
  repo: KWorks
  # GitHub provider 默认行为：Release 已存在时自动追加 assets，无需额外字段。
  # 注意：electron-builder schema 是严格模式 (additionalProperties: false)，
  # 任何未定义字段（如 allowUpdates）都会导致整个 publish 校验失败。
  # releaseType=release 控制创建的是正式 Release 而非 prerelease。
  releaseType: release
